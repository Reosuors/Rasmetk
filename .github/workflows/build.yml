name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Gradle Wrapper if missing
      run: |
        if [ ! -f "gradlew" ]; then
          echo "Gradlew missing, generating..."
          gradle wrapper
        fi

    - name: Decode Keystore File
      run: |
        if [ -f "debug.keystore.base64" ]; then
          echo "Decoding keystore to app folder..."
          base64 -d debug.keystore.base64 > app/debug.keystore
        else
          echo "Warning: debug.keystore.base64 not found!"
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug -Dorg.gradle.daemon=false -Djava.awt.headless=true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          .build-outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/debug/app-debug.apk
